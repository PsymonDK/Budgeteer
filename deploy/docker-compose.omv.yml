# Budgeteer — OpenMediaVault / Compose compose file
#
# Store these three secrets in this stack's Files tab (.env):
#
#   JWT_SECRET=<output of: openssl rand -hex 32>
#   POSTGRES_PASSWORD=<strong password>
#   ADMIN_PASSWORD=<your login password>
#
# All other values are pulled from your OMV global environment variables.

services:
  budgeteer-db:
    image: postgres:16-alpine
    container_name: budgeteer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: budgeteer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: budgeteer
      TZ: ${TIME_ZONE_VALUE}
    volumes:
      - ${PATH_TO_APPDATA}/budgeteer/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgeteer"]
      interval: 5s
      timeout: 5s
      retries: 10

  budgeteer-api:
    image: ghcr.io/psymondk/budgeteer-api:latest
    container_name: budgeteer-api
    restart: unless-stopped
    depends_on:
      budgeteer-db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - api
    environment:
      DATABASE_URL: postgresql://budgeteer:${POSTGRES_PASSWORD}@budgeteer-db:5432/budgeteer
      API_PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      # PUBLIC_URL: the URL your browser uses to reach the NAS (e.g. http://freedom.local:7272)
      # If you access via a reverse proxy with a custom domain, use that URL instead.
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:7272}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@budgeteer.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      BASE_CURRENCY: ${BASE_CURRENCY:-DKK}
      TZ: ${TIME_ZONE_VALUE}

  budgeteer-web:
    image: ghcr.io/psymondk/budgeteer-web:latest
    container_name: budgeteer-web
    restart: unless-stopped
    depends_on:
      - budgeteer-api
    ports:
      # Port the web UI is served on — default 7272
      - "${APP_PORT:-7272}:80"
    environment:
      TZ: ${TIME_ZONE_VALUE}
